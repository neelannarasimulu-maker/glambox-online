services:
  postgres:
    image: postgres:16-alpine
    container_name: glambox-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: glambox
      POSTGRES_PASSWORD: glambox
      POSTGRES_DB: glambox
    volumes:
      - glambox_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glambox -d glambox"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  glambox_postgres_data:
